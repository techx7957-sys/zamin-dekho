<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Zamin Dekho</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">

    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px 0;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .brand-logo { color: #0078ff; font-weight: 800; font-size: 2rem; text-align: center; margin-bottom: 20px; }
        .form-control, .form-select { padding: 12px 15px; border-radius: 8px; border: 1px solid #ced4da; }
        .form-control:focus, .form-select:focus { border-color: #0078ff; box-shadow: 0 0 0 0.2rem rgba(0, 120, 255, 0.25); }
        .btn-primary { background: #0078ff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; font-size: 1.1rem; transition: 0.3s; }
        .btn-primary:hover { background: #0056b3; transform: translateY(-2px); }
        .btn-dark { padding: 12px 20px; font-weight: bold; border-radius: 0 8px 8px 0; }
        .auth-links { text-align: center; margin-top: 20px; font-weight: 500; }
        .auth-links a { color: #0078ff; text-decoration: none; }
        .auth-links a:hover { text-decoration: underline; }

        /* Toast Alert */
        .msg-toast { position: fixed; top: 20px; right: 20px; padding: 15px 20px; border-radius: 8px; font-weight: 700; z-index: 1050; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .msg-success { background: #dcfce7; color: #166534; border-left: 5px solid #166534; }
        .msg-error { background: #fee2e2; color: #991b1b; border-left: 5px solid #991b1b; }
        .hidden { display: none !important; }

        /* 🌟 NAYA: Phone Input Dropdown Fixes */
        .iti { width: 100%; display: block; }
        .iti__flag-container { z-index: 10; border-right: 1px solid #ced4da; }
        .iti__selected-flag { border-top-left-radius: 8px; border-bottom-left-radius: 8px; background-color: #f8f9fa; padding: 0 15px; }
    </style>
</head>
<body>

    <div id="msgToast" class="msg-toast"></div>

    <div class="auth-card">
        <div class="brand-logo">
            <i class="fas fa-home"></i> Zamin Dekho
        </div>
        <h4 class="text-center fw-bold mb-4">Create an Account</h4>

        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label fw-bold">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="fas fa-user text-muted"></i></span>
                    <input type="text" class="form-control border-start-0" id="fullName" placeholder="Enter your name" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="fas fa-envelope text-muted"></i></span>
                    <input type="email" class="form-control border-start-0" id="email" placeholder="Enter your email" required>
                    <button type="button" class="btn btn-dark" id="sendOtpBtn">Send OTP</button>
                </div>
            </div>

            <div class="mb-3 hidden" id="otpContainer">
                <label class="form-label fw-bold text-success">Enter 6-Digit OTP</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="fas fa-key text-success"></i></span>
                    <input type="text" class="form-control border-start-0 border-success" id="otp" placeholder="Check your email inbox">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Phone Number</label>
                <input type="tel" class="form-control" id="phone" placeholder="Enter mobile number" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" class="form-control border-start-0" id="password" placeholder="Create a password" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">I am a...</label>
                <select class="form-select" id="role">
                    <option value="buyer">Buyer / Investor</option>
                    <option value="seller">Property Owner / Seller</option>
                    <option value="broker">Real Estate Broker / Agent</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary" id="regBtn">
                Register Now <i class="fas fa-arrow-right ms-2"></i>
            </button>
        </form>

        <div class="auth-links">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>

    <script>
        // 🌟 FIX: Removed localhost. API will now route correctly on live server.
        const API_BASE = "/api";
        const msgToast = document.getElementById('msgToast');

        function showToast(msg, type) {
            msgToast.innerHTML = type === 'error' ? `<i class="fas fa-exclamation-triangle"></i> ${msg}` : `<i class="fas fa-check-circle"></i> ${msg}`;
            msgToast.className = `msg-toast msg-${type}`;
            msgToast.style.display = 'block';
            setTimeout(() => { msgToast.style.display = 'none'; }, 4000); 
        }

        // ==========================================
        // 🌍 INITIALIZE SMART PHONE INPUT
        // ==========================================
        const phoneInputField = document.querySelector("#phone");
        const iti = window.intlTelInput(phoneInputField, {
            initialCountry: "in", // Default to India (+91)
            separateDialCode: true, 
            preferredCountries: ["in", "us", "gb", "ae", "ca", "au"], 
            utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js", 
        });

        // ==========================================
        // 📧 OTP SENDING LOGIC
        // ==========================================
        document.getElementById('sendOtpBtn').addEventListener('click', async function() {
            const email = document.getElementById('email').value;
            if(!email) {
                showToast("Please enter your email address first!", "error");
                return;
            }

            const btn = document.getElementById('sendOtpBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/auth/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (data.success) {
                    showToast("OTP sent to your email!", "success");
                    document.getElementById('otpContainer').classList.remove('hidden');
                    btn.innerHTML = '<i class="fas fa-check"></i> Sent';
                } else {
                    showToast(data.message || "Failed to send OTP.", "error");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                showToast("Server error. Check backend logs.", "error");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // ==========================================
        // 🚀 FINAL REGISTRATION LOGIC
        // ==========================================
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const otpValue = document.getElementById('otp').value;
            if(!otpValue) {
                showToast("Please request and enter the OTP to register.", "error");
                return;
            }

            if (!iti.isValidNumber()) {
                showToast("Please enter a valid phone number for the selected country.", "error");
                return;
            }

            const btn = document.getElementById('regBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
            btn.disabled = true;

            const userData = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: iti.getNumber(), // 🌟 Backend ko format jayega jaise +919876543210
                password: document.getElementById('password').value,
                role: document.getElementById('role').value,
                otp: otpValue
            };

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                const data = await response.json();

                if (data.success) {
                    showToast("Account created successfully! Redirecting to login...", "success");
                    setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                } else {
                    showToast(data.message || "Registration failed.", "error");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                showToast("Server error. Please make sure backend is running.", "error");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
