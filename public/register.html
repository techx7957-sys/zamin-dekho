<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Zamin Dekho</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">

    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");

        body { 
            background: #f8fafc; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Inter', sans-serif; 
            padding: 40px 20px;
        }

        .auth-card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 480px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.05); 
            border: 1px solid #e2e8f0;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .form-label { font-size: 14px; font-weight: 700; color: #475569; margin-bottom: 8px;}

        .form-control, .form-select { 
            padding: 12px 15px; 
            border-radius: 8px; 
            border: 1px solid #cbd5e1; 
            background: #f8fafc; 
            font-weight: 500; 
            color: #1e293b; 
            transition: 0.3s; 
            font-size: 15px;
        }
        .form-control:focus, .form-select:focus { 
            border-color: #10b981; 
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); 
            background: white; 
            outline: none; 
        }

        .input-group-text { 
            background: #f8fafc; 
            border: 1px solid #cbd5e1; 
            border-right: none; 
            border-radius: 8px 0 0 8px; 
            color: #64748b; 
        }
        .form-control:focus + .input-group-text, .input-group:focus-within .input-group-text { 
            background: white; 
            border-color: #10b981; 
            color: #10b981;
        }

        /* 🌟 NAYA: Password Eye Icon Fix */
        .password-eye {
            border-left: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            background: #f8fafc;
            transition: 0.3s;
        }
        .password-eye:hover { color: #10b981; }

        /* Send OTP Button (Inside Email Input) */
        .btn-send-otp {
            background: #1e293b;
            color: white;
            font-weight: 700;
            border: none;
            padding: 0 20px;
            border-radius: 0 8px 8px 0;
            transition: 0.2s;
            font-size: 14px;
        }
        .btn-send-otp:hover { background: #0f172a; color: white;}
        .btn-send-otp:disabled { background: #94a3b8; cursor: not-allowed;}

        /* Main Register Button */
        .btn-register { 
            background: #10b981; 
            border: none; 
            padding: 16px; 
            border-radius: 8px; 
            font-weight: 700; 
            width: 100%; 
            font-size: 16px; 
            transition: 0.3s; 
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2); 
            color: white;
        }
        .btn-register:hover { background: #059669; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); color: white;}
        .btn-register:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

        .auth-links { text-align: center; margin-top: 25px; font-weight: 500; font-size: 14.5px; color: #64748b;}
        .auth-links a { color: #3b82f6; text-decoration: none; font-weight: 700; }
        .auth-links a:hover { text-decoration: underline; }

        /* Phone Input Fixes */
        .iti { width: 100%; display: block; }
        .iti__flag-container { z-index: 10; }
        .iti__selected-flag { border-radius: 8px 0 0 8px; background-color: transparent; padding: 0 15px; border-right: 1px solid #cbd5e1;}
        .iti__country-list { border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #e2e8f0;}

        .otp-container { background: #ecfdf5; border: 1px solid #10b981; padding: 15px; border-radius: 8px; margin-top: 10px;}
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-success mb-1"><i class="fas fa-leaf me-1"></i> ZAMIN DEKHO</h2>
            <p class="text-muted small fw-bold">Create your professional account</p>
        </div>

        <form id="registerForm">

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control border-start-0 ps-0" id="fullName" placeholder="Enter your name" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number <span class="badge bg-success bg-opacity-10 text-success ms-1"><i class="fab fa-whatsapp"></i> WhatsApp OTP</span></label>
                <input type="tel" class="form-control" id="phone" placeholder="Enter mobile number" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control border-start-0 ps-0" id="email" placeholder="Enter your email" required>
                    <button type="button" class="btn-send-otp" id="sendOtpBtn">Send OTP</button>
                </div>
            </div>

            <div class="mb-3 d-none otp-container" id="otpContainer">
                <label class="form-label text-success mb-1"><i class="fas fa-check-circle me-1"></i> Code Sent to Email & WhatsApp</label>
                <input type="text" class="form-control text-center fw-bold fs-5" id="otp" placeholder="Enter 6-Digit OTP" maxlength="6" style="letter-spacing: 5px;">
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control border-start-0 border-end-0 ps-0" id="password" placeholder="Create a password" minlength="6" required>
                    <span class="input-group-text password-eye" id="togglePassword"><i class="fas fa-eye"></i></span>
                </div>
                <small class="text-muted" style="font-size: 11px; font-weight: 600;"><i class="fas fa-info-circle"></i> Password must be at least 6 characters long.</small>
            </div>

            <div class="mb-4">
                <label class="form-label">I am a...</label>
                <select class="form-select" id="role">
                    <option value="buyer">Buyer / Investor</option>
                    <option value="seller">Seller (Owner)</option>
                    <option value="broker">Broker / Agent</option>
                </select>
            </div>

            <button type="submit" class="btn-register" id="regBtn" disabled>
                Register Now <i class="fas fa-arrow-right ms-1"></i>
            </button>

        </form>

        <div class="auth-links">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>

    <script src="global.js"></script> 

    <script>
        // 🌟 NAYA: Password Visibility Toggle Logic
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });

        // Initialize Phone Input with Flag
        const phoneInputField = document.querySelector("#phone");
        const iti = window.intlTelInput(phoneInputField, {
            initialCountry: "in",
            separateDialCode: true, 
            preferredCountries: ["in", "us", "gb", "ae"], 
            utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js", 
        });

        // 📧 SEND OTP LOGIC (With Anti-Spam Timer)
        document.getElementById('sendOtpBtn').addEventListener('click', async function() {
            const email = document.getElementById('email').value.trim();
            const rawPhone = document.getElementById('phone').value.trim();

            if(!email || !rawPhone) {
                showToast("Please fill both Email and Phone Number first!", "error"); // 🔒 Using Global Secure Toast
                return;
            }

            if (!iti.isValidNumber()) {
                showToast("Please enter a valid phone number.", "error");
                return;
            }

            const fullPhone = iti.getNumber(); 
            const btn = document.getElementById('sendOtpBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            try {
                // 🔒 Using API_BASE from global.js
                const response = await fetch(`${API_BASE}/auth/send-multichannel-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, phone: fullPhone })
                });

                const data = await response.json();

                if (data.success) {
                    showToast(data.message || "OTP sent securely to Email and WhatsApp!", "success");
                    document.getElementById('otpContainer').classList.remove('d-none');
                    document.getElementById('regBtn').disabled = false; 

                    // 🛡️ SECURITY FIX: 60-Second Cooldown Timer (Anti-Spam)
                    let timeLeft = 60;
                    const timerId = setInterval(() => {
                        btn.innerHTML = `Resend in ${timeLeft}s`;
                        timeLeft--;
                        if (timeLeft < 0) {
                            clearInterval(timerId);
                            btn.innerHTML = 'Resend OTP';
                            btn.disabled = false;
                        }
                    }, 1000);

                } else {
                    showToast(data.message || "Failed to send OTP.", "error");
                    btn.innerHTML = 'Send OTP';
                    btn.disabled = false;
                }
            } catch (error) {
                showToast("Network error. Please try again.", "error");
                btn.innerHTML = 'Send OTP';
                btn.disabled = false;
            }
        });

        // 🚀 REGISTRATION LOGIC WITH 6 CHAR VALIDATION
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const passwordValue = document.getElementById('password').value;
            if(passwordValue.length < 6) {
                showToast("Password must be at least 6 characters!", "error");
                return;
            }

            const otpValue = document.getElementById('otp').value.trim();
            if(otpValue.length !== 6) {
                showToast("Please enter the complete 6-digit OTP.", "error");
                return;
            }

            const btn = document.getElementById('regBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Registering...';
            btn.disabled = true;

            // 🛡️ SECURITY FIX: Trim all inputs to avoid saving whitespace in DB
            const userData = {
                fullName: document.getElementById('fullName').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: iti.getNumber(),
                password: passwordValue,
                role: document.getElementById('role').value,
                otp: otpValue
            };

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                const data = await response.json();

                if (data.success) {
                    showToast("Account created! Redirecting to login...", "success");
                    setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                } else {
                    showToast(data.message || "Registration failed.", "error");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                showToast("Server error. Please try again later.", "error");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
