<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Zamin Dekho</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">

    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");

        body { 
            background: #f8fafc; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Inter', sans-serif; 
            padding: 40px 20px;
        }

        .auth-card { 
            background: white; 
            padding: 40px; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 500px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.05); 
            border: 1px solid #e2e8f0;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .form-label { font-size: 13px; font-weight: 700; color: #64748b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;}
        .form-control, .form-select { padding: 14px 15px; border-radius: 12px; border: 1px solid #cbd5e1; background: #f1f5f9; font-weight: 600; color: #1e293b; transition: 0.3s; font-size: 15px;}
        .form-control:focus, .form-select:focus { border-color: #10b981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); background: white; outline: none; }

        .input-group-text { background: #f1f5f9; border: 1px solid #cbd5e1; border-right: none; border-radius: 12px 0 0 12px; color: #94a3b8; transition: 0.3s;}
        .form-control:focus + .input-group-text { background: white; border-color: #10b981; }

        .btn-primary { background: #10b981; border: none; padding: 15px; border-radius: 12px; font-weight: 800; width: 100%; font-size: 16px; transition: 0.3s; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.2); margin-top: 10px;}
        .btn-primary:hover { background: #059669; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-dark-custom { background: #0f172a; color: white; border: none; padding: 14px 20px; font-weight: 700; border-radius: 12px; transition: 0.3s; width: 100%; margin-top: 10px;}
        .btn-dark-custom:hover { background: #1e293b; color: white;}
        .btn-dark-custom:disabled { background: #94a3b8; cursor: not-allowed; }

        .auth-links { text-align: center; margin-top: 25px; font-weight: 600; font-size: 14.5px; color: #64748b;}
        .auth-links a { color: #10b981; text-decoration: none; font-weight: 800; }
        .auth-links a:hover { text-decoration: underline; }

        .divider { display: flex; align-items: center; text-align: center; color: #94a3b8; font-size: 12px; font-weight: 700; margin: 25px 0; text-transform: uppercase; letter-spacing: 1px;}
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #e2e8f0; }
        .divider:not(:empty)::before { margin-right: 1em; }
        .divider:not(:empty)::after { margin-left: 1em; }

        /* Toast Alert */
        .msg-toast { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 12px; font-weight: 700; z-index: 1050; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .msg-success { background: #ecfdf5; color: #065f46; border-left: 5px solid #10b981; }
        .msg-error { background: #fef2f2; color: #991b1b; border-left: 5px solid #ef4444; }

        /* Phone Input Fixes */
        .iti { width: 100%; display: block; }
        .iti__flag-container { z-index: 10; }
        .iti__selected-flag { border-radius: 12px 0 0 12px; background-color: transparent; padding: 0 15px; }
        .iti__country-list { border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #e2e8f0;}

        /* Verification Box */
        .verification-box { background: #f8fafc; border: 2px dashed #cbd5e1; padding: 20px; border-radius: 16px; margin-bottom: 20px; transition: 0.3s;}
        .verification-box.active { border-color: #10b981; background: #ecfdf5; }
    </style>
</head>
<body>

    <div id="msgToast" class="msg-toast"></div>

    <div class="auth-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-success mb-1"><i class="fas fa-leaf me-1"></i> ZAMIN DEKHO</h2>
            <p class="text-muted small fw-bold">Create your professional account</p>
        </div>

        <form id="registerForm">

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control border-start-0 ps-0" id="fullName" placeholder="Enter your full name" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">I am a...</label>
                <select class="form-select" id="role">
                    <option value="buyer">Buyer / Investor (Default)</option>
                    <option value="seller">Property Owner / Seller</option>
                    <option value="broker">Real Estate Broker / Agent</option>
                </select>
            </div>

            <div class="divider">Contact Details</div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control border-start-0 ps-0" id="email" placeholder="name@example.com" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="phone" placeholder="Enter mobile number" required>
            </div>

            <div class="verification-box" id="verifyBox">
                <button type="button" class="btn-dark-custom m-0" id="sendOtpBtn">
                    <i class="fas fa-shield-alt me-2"></i> Verify Identity (Send OTP)
                </button>

                <div class="mt-3 d-none" id="otpContainer">
                    <label class="form-label text-success"><i class="fas fa-check-circle me-1"></i> Enter 6-Digit OTP</label>
                    <input type="text" class="form-control border-success text-center fw-bold fs-5" id="otp" placeholder="• • • • • •" maxlength="6" style="letter-spacing: 5px;">
                    <small class="text-muted fw-bold mt-2 d-block text-center">Sent via WhatsApp, SMS & Email</small>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Create Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control border-start-0 ps-0" id="password" placeholder="Minimum 6 characters" required minlength="6">
                </div>
            </div>

            <button type="submit" class="btn-primary" id="regBtn" disabled>
                Complete Registration <i class="fas fa-arrow-right ms-2"></i>
            </button>
        </form>

        <div class="auth-links">
            Already have an account? <a href="login.html">Log In securely</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>

    <script>
        const API_BASE = "/api";
        const msgToast = document.getElementById('msgToast');

        function showToast(msg, type) {
            msgToast.innerHTML = type === 'error' ? `<i class="fas fa-exclamation-triangle me-2"></i> ${msg}` : `<i class="fas fa-check-circle me-2"></i> ${msg}`;
            msgToast.className = `msg-toast msg-${type}`;
            msgToast.style.display = 'block';
            setTimeout(() => { msgToast.style.display = 'none'; }, 4000); 
        }

        // ==========================================
        // 🌍 INITIALIZE SMART PHONE INPUT
        // ==========================================
        const phoneInputField = document.querySelector("#phone");
        const iti = window.intlTelInput(phoneInputField, {
            initialCountry: "in",
            separateDialCode: true, 
            preferredCountries: ["in", "us", "gb", "ae"], 
            utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js", 
        });

        // ==========================================
        // 📧 SEND MULTICHANNEL OTP LOGIC
        // ==========================================
        document.getElementById('sendOtpBtn').addEventListener('click', async function() {
            const email = document.getElementById('email').value.trim();
            const rawPhone = document.getElementById('phone').value.trim();

            if(!email || !rawPhone) {
                showToast("Please fill both Email and Phone Number first!", "error");
                return;
            }

            if (!iti.isValidNumber()) {
                showToast("Please enter a valid phone number.", "error");
                return;
            }

            const fullPhone = iti.getNumber(); // Gets format like +919876543210
            const btn = document.getElementById('sendOtpBtn');
            const originalText = btn.innerHTML;

            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Sending OTP...';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/auth/send-multichannel-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, phone: fullPhone })
                });

                const data = await response.json();

                if (data.success) {
                    showToast("OTP sent securely to all channels!", "success");
                    document.getElementById('otpContainer').classList.remove('d-none');
                    document.getElementById('verifyBox').classList.add('active');
                    document.getElementById('regBtn').disabled = false; // Enable final submit

                    btn.innerHTML = '<i class="fas fa-check-circle me-2"></i> Resend OTP';
                    btn.classList.replace('btn-dark-custom', 'btn-light');
                    btn.classList.add('text-success', 'border', 'border-success', 'fw-bold');
                    setTimeout(() => { btn.disabled = false; }, 30000); // 30 sec cooldown
                } else {
                    showToast(data.message || "Failed to send OTP.", "error");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                showToast("Network error. Please try again.", "error");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // ==========================================
        // 🚀 FINAL REGISTRATION LOGIC
        // ==========================================
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const otpValue = document.getElementById('otp').value.trim();
            if(otpValue.length !== 6) {
                showToast("Please enter the complete 6-digit OTP.", "error");
                return;
            }

            const btn = document.getElementById('regBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Creating Account...';
            btn.disabled = true;

            const userData = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: iti.getNumber(),
                password: document.getElementById('password').value,
                role: document.getElementById('role').value,
                otp: otpValue
            };

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                const data = await response.json();

                if (data.success) {
                    showToast("Account created! Redirecting to login...", "success");
                    setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                } else {
                    showToast(data.message || "Registration failed.", "error");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                showToast("Server error. Please try again later.", "error");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
