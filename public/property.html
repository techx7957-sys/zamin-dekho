<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Property Details | Zamin Dekho</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");

            body {
                background: #f8fafc;
                font-family: "Inter", sans-serif;
                color: #1e293b;
            }

            /* Navbar */
            .navbar {
                box-shadow: 0 2px 15px rgba(0, 0, 0, 0.04);
                padding: 15px 0;
                background: white !important;
            }
            .navbar-brand {
                font-weight: 800;
                letter-spacing: -0.5px;
                color: #10b981 !important;
                font-size: 24px;
            }
            .nav-link {
                font-weight: 600;
                color: #475569 !important;
                margin: 0 15px;
                font-size: 15px;
                transition: 0.3s;
            }
            .nav-link:hover {
                color: #10b981 !important;
            }

            /* Auth UI */
            .auth-area {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .user-id-btn {
                background: #f8fafc;
                border: 1px solid #cbd5e1;
                color: #1e293b;
                padding: 8px 20px;
                border-radius: 50px;
                font-weight: 700;
                font-size: 14px;
                transition: 0.2s;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .user-id-btn:hover {
                background: #e2e8f0;
            }
            .logout-btn-premium {
                background: white;
                border: 1px solid #ef4444;
                color: #ef4444;
                padding: 8px 20px;
                border-radius: 50px;
                font-weight: 700;
                font-size: 14px;
                transition: 0.2s;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 6px;
            }
            .logout-btn-premium:hover {
                background: #fee2e2;
            }

            /* Property Images */
            .prop-main-img {
                width: 100%;
                height: 450px;
                object-fit: cover;
                border-radius: 20px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            }

            /* Content Sections */
            .detail-box {
                background: white;
                padding: 30px;
                border-radius: 20px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
                border: 1px solid #e2e8f0;
                margin-bottom: 25px;
            }
            .prop-title {
                font-weight: 800;
                font-size: 28px;
                color: #0f172a;
                margin-bottom: 10px;
            }
            .prop-price {
                font-weight: 800;
                font-size: 32px;
                color: #10b981;
            }
            .prop-address {
                color: #64748b;
                font-size: 16px;
                font-weight: 500;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .feature-pill {
                background: #f1f5f9;
                padding: 10px 20px;
                border-radius: 12px;
                display: inline-flex;
                align-items: center;
                gap: 10px;
                font-weight: 700;
                color: #334155;
                margin-right: 10px;
                margin-bottom: 10px;
            }
            .feature-pill i {
                color: #3b82f6;
                font-size: 18px;
            }

            /* 🌟 THE BUY ACTION CARD */
            .action-card {
                background: white;
                padding: 30px;
                border-radius: 20px;
                box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
                border: 1px solid #e2e8f0;
                position: sticky;
                top: 100px;
                text-align: center;
            }

            /* 🌟 AI METER STYLING */
            .ai-valuation-box {
                background: #f8fafc;
                border-radius: 12px;
                border: 1px solid #e2e8f0;
                padding: 15px;
                margin-bottom: 20px;
                text-align: left;
            }
            .ai-progress-bg {
                height: 10px;
                background: #e2e8f0;
                border-radius: 50px;
                overflow: hidden;
                margin: 10px 0;
            }
            .ai-progress-bar {
                height: 100%;
                width: 0%;
                transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
                border-radius: 50px;
            }

            /* 🌟 SATELLITE MAP STYLING */
            #satelliteMap { 
                height: 250px; 
                width: 100%; 
                border-radius: 12px; 
                z-index: 1; 
                border: 1px solid #cbd5e1; 
                margin-bottom: 20px;
            }

            /* Booking Button */
            .btn-book-option {
                background: #f59e0b;
                color: white;
                border: none;
                width: 100%;
                padding: 18px;
                border-radius: 12px;
                font-size: 18px;
                font-weight: 800;
                transition: 0.3s;
                box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
                cursor: pointer;
                margin-bottom: 15px;
            }
            .btn-book-option:hover {
                background: #d97706;
                transform: translateY(-3px);
                color: white;
            }

            .btn-inquiry-option {
                background: white;
                color: #3b82f6;
                border: 2px solid #3b82f6;
                width: 100%;
                padding: 15px;
                border-radius: 12px;
                font-size: 16px;
                font-weight: 800;
                transition: 0.3s;
                cursor: pointer;
            }
            .btn-inquiry-option:hover {
                background: #eff6ff;
            }

            .contact-block {
                display: none;
                margin-top: 20px;
                padding-top: 20px;
                border-top: 2px dashed #e2e8f0;
                animation: fadeIn 0.5s;
            }
            .broker-info {
                font-weight: 700;
                color: #1e293b;
                font-size: 16px;
                margin-bottom: 15px;
            }
            .btn-call {
                background: #10b981;
                color: white;
                border: none;
                width: 100%;
                padding: 15px;
                border-radius: 12px;
                font-size: 18px;
                font-weight: 800;
                text-decoration: none;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
                transition: 0.3s;
            }
            .btn-call:hover {
                background: #059669;
                color: white;
                transform: translateY(-3px);
            }
        </style>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-light sticky-top">
            <div class="container">
                <a class="navbar-brand" href="index.html"
                    ><i class="fas fa-leaf me-1"></i> ZAMIN DEKHO</a
                >
                <button
                    class="navbar-toggler border-0 shadow-none"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#zaminNav"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="zaminNav">
                    <ul class="navbar-nav mx-auto mb-2 mb-lg-0 text-center">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Find Land</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="dashboard.html#postTab"
                                >Post Property</a
                            >
                        </li>
                        <li id="adminLinkArea" class="nav-item"></li>
                    </ul>
                    <div
                        id="authArea"
                        class="auth-area justify-content-center mt-3 mt-lg-0"
                    ></div>
                </div>
            </div>
        </nav>

        <div class="container mt-4 mb-5" id="propertyContent">
            <div class="text-center py-5">
                <div
                    class="spinner-border text-success"
                    style="width: 3rem; height: 3rem"
                ></div>
                <h4 class="mt-3">Loading Details...</h4>
            </div>
        </div>

        <div class="modal fade" id="userProfileModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                    <div class="modal-header border-0 pb-0">
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" onclick="cancelProfileEdit()"></button>
                    </div>
                    <div class="modal-body text-center pb-5 px-4">

                        <div class="position-relative d-inline-block mb-3">
                            <img src="" id="modalUserAvatar" class="rounded-circle shadow-sm" style="width: 100px; height: 100px; border: 4px solid #ecfdf5; object-fit: cover;">
                            <label for="avatarUpload" id="avatarEditBtn" class="position-absolute bottom-0 end-0 bg-primary text-white rounded-circle p-2 shadow-sm d-none" style="cursor: pointer; width: 32px; height: 32px; line-height: 14px; right: -5px;">
                                <i class="fas fa-camera" style="font-size: 14px;"></i>
                            </label>
                            <input type="file" id="avatarUpload" accept="image/*" class="d-none" onchange="previewAvatar(event)">
                        </div>

                        <div id="nameDisplayContainer">
                            <h3 class="fw-bold mb-0 text-dark" id="modalUserName">User Name</h3>
                            <button class="btn btn-link text-primary fw-bold p-0 mb-3 text-decoration-none" style="font-size: 13px;" onclick="enableProfileEdit()">
                                <i class="fas fa-pencil-alt me-1"></i> Edit Profile
                            </button>
                        </div>

                        <div id="nameEditContainer" class="d-none mb-3 px-3">
                            <input type="text" id="editNameInput" class="form-control text-center fw-bold mb-2" placeholder="Enter Full Name">
                            <div class="d-flex gap-2">
                                <button class="btn btn-light btn-sm w-50 fw-bold" onclick="cancelProfileEdit()">Cancel</button>
                                <button class="btn btn-success btn-sm w-50 fw-bold" onclick="saveProfile()" id="saveProfileBtn"><i class="fas fa-save me-1"></i> Save</button>
                            </div>
                        </div>

                        <p class="text-muted mb-3" id="modalUserEmail">user@email.com</p>

                        <div class="d-inline-block px-3 py-2 bg-light rounded-pill mb-4 border">
                            <span class="fw-bold text-dark">Role:</span>
                            <span class="badge ms-2 px-3 py-2" id="modalUserRole" style="font-size:12px; text-transform:uppercase; letter-spacing: 0.5px;">Buyer</span>
                        </div>

                        <div class="text-start bg-light p-3 rounded-3 mb-4 border border-light shadow-sm">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <small class="text-muted fw-bold text-uppercase" style="font-size: 11px;"><i class="fas fa-id-card me-1"></i> Account ID</small>
                                    <div class="fw-bold text-dark mt-1 fs-5" id="modalUserId" style="font-family: monospace;">#12345</div>
                                </div>
                                <i class="fas fa-check-circle text-success fs-3"></i>
                            </div>
                        </div>

                        <a href="dashboard.html" class="btn btn-primary w-100 rounded-pill fw-bold py-3 mb-2 shadow-sm"><i class="fas fa-columns me-2"></i> Go to Dashboard</a>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        <script>
            const API_URL = "/api";
            const BASE_SERVER_URL = "/";
            let propertyData = null;

            async function loadProperty() {
                const urlParams = new URLSearchParams(window.location.search);
                const propId = urlParams.get("id");
                const contentDiv = document.getElementById("propertyContent");
                const token = localStorage.getItem("zamin_token");

                if (!propId) {
                    contentDiv.innerHTML = `<div class="text-center text-danger py-5"><h2>Property ID Missing!</h2><a href="index.html" class="btn btn-primary mt-3">Go Back to Search</a></div>`;
                    return;
                }

                try {
                    let fetchConfig = {};
                    if (token)
                        fetchConfig.headers = {
                            Authorization: `Bearer ${token}`,
                        };

                    const res = await fetch(
                        `${API_URL}/listings/${propId}`,
                        fetchConfig,
                    );
                    const data = await res.json();

                    if (data.success) {
                        propertyData = data.listing;
                        renderProperty(propertyData);
                    } else {
                        contentDiv.innerHTML = `<div class="text-center text-danger py-5"><h2>Property Not Found!</h2><p>It may have been sold or removed by admin.</p><a href="index.html" class="btn btn-primary mt-3">Go Back to Search</a></div>`;
                    }
                } catch (e) {
                    contentDiv.innerHTML = `<div class="text-center text-danger py-5"><h2>Server Error!</h2><p>Could not connect to database.</p></div>`;
                }
            }

            function renderProperty(item) {
                let imgSource = item.imageUrl;
                if (imgSource && !imgSource.startsWith("http")) {
                    imgSource = imgSource.replace(/\\/g, "/");
                    imgSource =
                        BASE_SERVER_URL +
                        (imgSource.startsWith("/")
                            ? imgSource.substring(1)
                            : imgSource);
                }
                const fallbackImg =
                    "https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=1000&q=80";
                if (!imgSource) imgSource = fallbackImg;

                document.getElementById("propertyContent").innerHTML = `
                <div class="row g-4">
                    <div class="col-lg-8">
                        <img src="${imgSource}" onerror="this.src='${fallbackImg}'" class="prop-main-img mb-4" alt="Property Image">

                        <div class="detail-box">
                            <span class="badge bg-dark px-3 py-2 rounded-pill mb-3 text-uppercase">${item.category}</span>
                            <h1 class="prop-title">${item.landName}</h1>
                            <p class="prop-address"><i class="fas fa-map-marker-alt text-danger"></i> ${item.address}</p>

                            <hr class="my-4">

                            <h4 class="fw-bold mb-3">Overview</h4>
                            <div class="d-flex flex-wrap">
                                <div class="feature-pill"><i class="fas fa-tag"></i> Verified Listing</div>
                                ${item.landSize && item.landSize !== "Not Specified" ? `<div class="feature-pill"><i class="fas fa-vector-square"></i> ${item.landSize}</div>` : ""}
                                ${item.length ? `<div class="feature-pill"><i class="fas fa-ruler-horizontal"></i> L: ${item.length}</div>` : ""}
                                ${item.breadth ? `<div class="feature-pill"><i class="fas fa-ruler-vertical"></i> W: ${item.breadth}</div>` : ""}
                                ${item.roadConnectivity && item.roadConnectivity !== "Not Specified" ? `<div class="feature-pill"><i class="fas fa-road"></i> ${item.roadConnectivity}</div>` : ""}
                                <div class="feature-pill"><i class="fas fa-chart-line"></i> High Growth Area</div>
                            </div>

                            <h4 class="fw-bold mt-4 mb-3">Property Description</h4>
                            <p class="text-muted" style="font-size:16px; line-height:1.8;">
                                ${item.extraInfo || "A premium property located in a highly sought-after area. Perfect for investment or immediate use. Contact us for physical site visits and document verification."}
                            </p>
                        </div>
                    </div>

                    <div class="col-lg-4">
                        <div class="action-card">
                            <h5 class="text-muted fw-bold mb-1">Estimated Price</h5>
                            <div class="prop-price mb-3">₹ ${Number(item.landPrice).toLocaleString("en-IN")}</div>

                            <div class="ai-valuation-box shadow-sm">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <h6 class="fw-bold m-0 text-dark"><i class="fas fa-robot text-primary me-2"></i>Zamin AI Analysis</h6>
                                </div>

                                <div id="ai-loading" class="text-center py-3">
                                    <div class="spinner-grow spinner-grow-sm text-primary" role="status"></div>
                                    <span class="text-muted small ms-2 fw-bold">Analyzing market data...</span>
                                </div>

                                <div id="ai-result" style="display: none;">
                                    <div class="d-flex justify-content-between small fw-bold mt-2" style="font-size: 11px;">
                                        <span class="text-success">Great Deal</span>
                                        <span class="text-warning">Fair</span>
                                        <span class="text-danger">Overpriced</span>
                                    </div>
                                    <div class="ai-progress-bg">
                                        <div id="ai-meter" class="ai-progress-bar bg-warning" style="width: 0%;"></div>
                                    </div>
                                    <p id="ai-text" class="text-center fw-bold mt-2 mb-0" style="font-size: 14px; color: #1e293b;"></p>
                                </div>
                            </div>

                            <h6 class="fw-bold text-start mb-2 mt-4 text-secondary"><i class="fas fa-satellite me-2"></i>Satellite Location</h6>
                            <div id="satelliteMap"></div>

                            <button class="btn-book-option" onclick="goToCheckout('${item._id}')">
                                <i class="fas fa-lock me-2"></i> Book with Token
                            </button>

                            <button id="buyBtn" class="btn-inquiry-option" onclick="triggerBuyFlow('${item._id}')">
                                <i class="fas fa-phone-alt me-2"></i> Request Call Back
                            </button>

                            <div id="contactBlock" class="contact-block">
                                <div class="broker-info">
                                    <i class="fas fa-check-circle text-success me-1"></i> Request Sent!
                                </div>
                                <p class="text-muted small mb-3">A broker will call you shortly to discuss details.</p>

                                <a href="tel:+919876543210" class="btn-call" id="callZaminBtn">
                                    <i class="fas fa-headset"></i> Call Support Now
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;

                // Call Map & AI Engine after HTML injection
                initSatelliteMap(item.address);
                runAIPrediction(item.landPrice);
            }

            // ==========================================
            // 🌟 THE AI PREDICTION ENGINE
            // ==========================================
            function runAIPrediction(actualPrice) {
                setTimeout(() => {
                    document.getElementById('ai-loading').style.display = 'none';
                    document.getElementById('ai-result').style.display = 'block';

                    const variance = (Math.random() * 0.2) - 0.1; 
                    const aiEstimatedPrice = actualPrice * (1 + variance);

                    let meterWidth = "50%";
                    let meterColor = "bg-warning";
                    let aiMessage = "🟡 Fair Market Value";

                    if (actualPrice < aiEstimatedPrice * 0.96) {
                        meterWidth = "15%"; 
                        meterColor = "bg-success";
                        aiMessage = "🟢 Great Deal! (Below Market Avg)";
                    } else if (actualPrice > aiEstimatedPrice * 1.04) {
                        meterWidth = "85%"; 
                        meterColor = "bg-danger";
                        aiMessage = "🔴 Priced Above Market Avg";
                    }

                    setTimeout(() => {
                        const meter = document.getElementById('ai-meter');
                        meter.style.width = meterWidth;
                        meter.className = `ai-progress-bar ${meterColor}`;
                        document.getElementById('ai-text').innerText = aiMessage;
                    }, 100);

                }, 1800); 
            }

            // ==========================================
            // 🌟 SATELLITE MAP ENGINE (FREE GEOCODING)
            // ==========================================
            async function initSatelliteMap(address) {
                const map = L.map('satelliteMap').setView([20.5937, 78.9629], 5);

                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                    attribution: '&copy; Esri'
                }).addTo(map);

                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                    const data = await res.json();

                    if (data && data.length > 0) {
                        const lat = data[0].lat;
                        const lon = data[0].lon;

                        map.setView([lat, lon], 17);

                        L.circle([lat, lon], {
                            color: 'red',
                            fillColor: '#f03',
                            fillOpacity: 0.4,
                            radius: 50
                        }).addTo(map)
                        .bindPopup("<b class='text-dark'>Approximate Boundary</b><br><span class='text-success fw-bold'><i class='fas fa-shield-check'></i> Verified Area</span>")
                        .openPopup();
                    } else {
                        console.log("Geocoding failed to find exact location.");
                    }
                } catch (e) {
                    console.error("Map Error:", e);
                }
            }

            // ==========================================
            // 🌟 3A. REDIRECT TO CHECKOUT
            // ==========================================
            function goToCheckout(propertyId) {
                const token = localStorage.getItem("zamin_token");
                if (!token) {
                    alert("Please Login to book this property.");
                    window.location.href = `login.html`;
                    return;
                }
                window.location.href = `checkout.html?id=${propertyId}`;
            }

            // ==========================================
            // 🌟 3B. THE INQUIRY ENGINE (Lead Generation)
            // ==========================================
            async function triggerBuyFlow(propertyId) {
                const token = localStorage.getItem("zamin_token");
                const buyBtn = document.getElementById("buyBtn");
                const contactBlock = document.getElementById("contactBlock");

                if (!token) {
                    alert("Please Login to express interest.");
                    window.location.href = `login.html`;
                    return;
                }

                buyBtn.innerHTML =
                    '<i class="fas fa-spinner fa-spin"></i> Sending Request...';
                buyBtn.disabled = true;

                try {
                    const res = await fetch(
                        `${API_URL}/listings/buy-request/${propertyId}`,
                        {
                            method: "POST",
                            headers: { Authorization: `Bearer ${token}` },
                        },
                    );

                    const data = await res.json();

                    if (data.success) {
                        buyBtn.style.display = "none";
                        contactBlock.style.display = "block";

                        if (data.adminPhone) {
                            document.getElementById("callZaminBtn").href =
                                `tel:${data.adminPhone}`;
                        }
                    } else {
                        alert("System Message: " + data.message);
                        if (data.message.includes("pehle hi is zamin")) {
                            buyBtn.style.display = "none";
                            contactBlock.style.display = "block";
                        } else {
                            buyBtn.innerHTML =
                                '<i class="fas fa-phone-alt me-2"></i> Request Call Back';
                            buyBtn.disabled = false;
                        }
                    }
                } catch (e) {
                    alert("Network error.");
                    buyBtn.innerHTML =
                        '<i class="fas fa-phone-alt me-2"></i> Request Call Back';
                    buyBtn.disabled = false;
                }
            }

            // ==========================================
            // 🌟 EDIT PROFILE LOGIC & NAVBAR UPDATE 🌟
            // ==========================================
            let tempAvatarBase64 = null;

            function enableProfileEdit() {
                document.getElementById('nameDisplayContainer').classList.add('d-none');
                document.getElementById('nameEditContainer').classList.remove('d-none');
                document.getElementById('avatarEditBtn').classList.remove('d-none'); 

                const currentName = document.getElementById('modalUserName').innerText;
                document.getElementById('editNameInput').value = currentName === 'User' ? '' : currentName;
            }

            function cancelProfileEdit() {
                document.getElementById('nameDisplayContainer').classList.remove('d-none');
                document.getElementById('nameEditContainer').classList.add('d-none');
                document.getElementById('avatarEditBtn').classList.add('d-none'); 

                const user = JSON.parse(localStorage.getItem('zamin_user'));
                const avatarUrl = user.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.fullName || 'User')}&background=10b981&color=fff&size=100`;
                document.getElementById('modalUserAvatar').src = avatarUrl;
                tempAvatarBase64 = null;
            }

            function previewAvatar(event) {
                const file = event.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        tempAvatarBase64 = e.target.result;
                        document.getElementById('modalUserAvatar').src = tempAvatarBase64;
                    }
                    reader.readAsDataURL(file);
                }
            }

            async function saveProfile() {
                const newName = document.getElementById('editNameInput').value.trim();
                if(!newName) return alert("Name cannot be empty");

                const btn = document.getElementById('saveProfileBtn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
                btn.disabled = true;

                const token = localStorage.getItem('zamin_token');
                let user = JSON.parse(localStorage.getItem('zamin_user'));

                try {
                    const response = await fetch(`${API_URL}/auth/update-profile`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                        body: JSON.stringify({ fullName: newName, avatar: tempAvatarBase64 || user.avatar })
                    });

                    const data = await response.json();

                    if (data.success) {
                        user.fullName = newName;
                        if(tempAvatarBase64) user.avatar = tempAvatarBase64;
                        localStorage.setItem('zamin_user', JSON.stringify(user));

                        updateNavbarUI();
                        cancelProfileEdit(); 
                    } else {
                         alert("Failed to update profile: " + data.message);
                    }

                } catch (error) {
                    alert("Error saving profile. Please check server.");
                } finally {
                    btn.innerHTML = '<i class="fas fa-save me-1"></i> Save';
                    btn.disabled = false;
                }
            }

            function updateNavbarUI() {
                const token = localStorage.getItem("zamin_token");
                const authArea = document.getElementById("authArea");
                const adminArea = document.getElementById("adminLinkArea");

                if (token) {
                    try {
                        const user = JSON.parse(localStorage.getItem("zamin_user"));
                        if (user.role === "admin" || user.role === "broker") {
                            adminArea.innerHTML = `<a class="nav-link text-danger fw-bold" style="background: #fee2e2; padding: 8px 16px !important;" href="admin.html"><i class="fas fa-shield-alt me-1"></i> CRM Panel</a>`;
                        }

                        const firstName = user.fullName ? user.fullName.split(" ")[0] : "User";

                        document.getElementById('modalUserName').innerText = user.fullName || 'User';
                        document.getElementById('modalUserEmail').innerText = user.email || 'No email';

                        const avatarUrl = user.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.fullName || 'User')}&background=10b981&color=fff&size=100`;
                        document.getElementById('modalUserAvatar').src = avatarUrl;

                        const roleBadge = document.getElementById('modalUserRole');
                        roleBadge.innerText = user.role || 'Buyer';
                        if(user.role === 'admin') { roleBadge.className = 'badge bg-danger ms-2 px-3 py-2'; }
                        else if(user.role === 'broker') { roleBadge.className = 'badge bg-warning text-dark ms-2 px-3 py-2'; }
                        else if(user.role === 'seller') { roleBadge.className = 'badge bg-success ms-2 px-3 py-2'; }
                        else { roleBadge.className = 'badge bg-primary ms-2 px-3 py-2'; }

                        document.getElementById('modalUserId').innerText = user._id ? `#${user._id}` : 'N/A';

                        authArea.innerHTML = `
                            <button data-bs-toggle="modal" data-bs-target="#userProfileModal" class="user-id-btn me-2 border-0 bg-light"><img src="${avatarUrl}" style="width:20px; height:20px; border-radius:50%; object-fit:cover;" class="me-1"> ${firstName}</button>
                            <button onclick="logout()" class="logout-btn-premium"><i class="fas fa-sign-out-alt"></i> Logout</button>
                        `;
                    } catch (e) {}
                } else {
                    authArea.innerHTML = `<a href="login.html" class="btn btn-primary rounded-pill px-4 py-2 fw-bold shadow-sm">Login to Explore</a>`;
                }
            }

            function logout() {
                localStorage.removeItem("zamin_token");
                localStorage.removeItem("zamin_user");
                window.location.reload();
            }

            window.onload = () => {
                updateNavbarUI();
                loadProperty();
            };
        </script>
    </body>
</html>
