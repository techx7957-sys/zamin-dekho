<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Zamin Dekho</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { 
            background: #f8fafc; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
        }
        .auth-card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 420px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.06); 
        }

        .form-control { padding: 12px 15px; border-radius: 8px; border: 1px solid #ced4da; font-size: 15px; }
        .form-control:focus { border-color: #0078ff; box-shadow: 0 0 0 0.2rem rgba(0, 120, 255, 0.25); }
        .btn-primary { background: #0078ff; border: none; padding: 12px; border-radius: 8px; font-weight: 600; font-size: 16px; transition: 0.3s; }
        .btn-primary:hover { background: #0056b3; transform: translateY(-1px); }

        /* 🌟 NAYA: Ultra-Professional Social Buttons */
        .btn-google { 
            background-color: #ffffff; 
            color: #3c4043; /* Standard Google Text Color */
            border: 1px solid #dadce0; 
            border-radius: 8px; 
            font-weight: 500; 
            font-size: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.2s ease;
        }
        .btn-google:hover { 
            background-color: #f8f9fa; 
            box-shadow: 0 1px 3px rgba(60,64,67,0.1); 
            color: #3c4043;
        }

        .btn-x { 
            background-color: #0f1419; /* Pure X/Twitter Dark */
            color: #ffffff; 
            border: 1px solid #0f1419; 
            border-radius: 8px; 
            font-weight: 500; 
            font-size: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.2s ease;
        }
        .btn-x:hover { 
            background-color: #272c30; 
            color: #ffffff; 
        }

        .divider { display: flex; align-items: center; text-align: center; color: #6c757d; font-size: 13px; font-weight: 500; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #e5e7eb; }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        /* Toast Alert */
        .msg-toast { position: fixed; top: 20px; right: 20px; padding: 15px 20px; border-radius: 8px; font-weight: 700; z-index: 1050; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .msg-success { background: #dcfce7; color: #166534; border-left: 5px solid #166534; }
        .msg-error { background: #fee2e2; color: #991b1b; border-left: 5px solid #991b1b; }
    </style>
</head>
<body>

    <div id="msgToast" class="msg-toast"></div>

    <div class="auth-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-success mb-1">🏠 Welcome Back</h2>
            <p class="text-muted small">Login to access Zamin Dekho</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <input type="email" id="email" class="form-control" placeholder="Email Address" required>
            </div>
            <div class="mb-4">
                <input type="password" id="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 mb-3" id="loginBtn">Login</button>
        </form>

        <div class="divider mb-3">OR LOGIN WITH</div>

        <a href="/api/auth/google" class="btn btn-google w-100 py-2 mb-3 text-decoration-none">
            <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" class="me-3" style="width: 20px;">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
            </svg>
            Continue with Google
        </a>

        <a href="/api/auth/x" class="btn btn-x w-100 py-2 mb-4 text-decoration-none">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="me-3" style="width: 16px; fill: currentColor;">
                <path d="M389.2 48h70.6L305.6 224.2 487 464H345L233.7 318.6 106.5 464H35.8L200.7 275.5 26.8 48H172.4L272.9 180.9 389.2 48zM364.4 421.8h39.1L151.1 88h-42L364.4 421.8z"/>
            </svg>
            Continue with X
        </a>

        <p class="text-center small mb-0 text-muted">Don't have an account? <a href="register.html" class="fw-bold text-primary text-decoration-none">Register Here</a></p>
    </div>

    <script>
        // 🌟 NAYA: Check if URL has social login token
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const userStr = urlParams.get('user');

            if(token && userStr) {
                localStorage.setItem('zamin_token', token);
                localStorage.setItem('zamin_user', decodeURIComponent(userStr));

                // Clean the URL
                window.history.replaceState({}, document.title, window.location.pathname);

                showToast("Social Login Successful!", "success");
                setTimeout(() => window.location.href = 'index.html', 1000);
            }
        };

        const msgToast = document.getElementById('msgToast');

        function showToast(msg, type) {
            msgToast.innerHTML = type === 'error' ? `<i class="fas fa-exclamation-triangle"></i> ${msg}` : `<i class="fas fa-check-circle"></i> ${msg}`;
            msgToast.className = `msg-toast msg-${type}`;
            msgToast.style.display = 'block';
            setTimeout(() => { msgToast.style.display = 'none'; }, 4000); 
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const btn = document.getElementById('loginBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            btn.disabled = true;

            try {
                // 🌟 FIX: API Link ko Localhost se hata diya hai
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.success) {
                    showToast("Login Successful! Redirecting...", "success");
                    localStorage.setItem('zamin_token', data.token);
                    localStorage.setItem('zamin_user', JSON.stringify(data.user));

                    setTimeout(() => {
                        // 🌟 FIX: Broker ko bhi directly Admin panel mein bhejo
                        if(data.user.role === 'admin' || data.user.role === 'broker') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    }, 1500);
                } else {
                    showToast(data.message || "Invalid credentials!", "error");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (err) {
                showToast("Server error. Check if backend is running.", "error");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
