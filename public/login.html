<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | Zamin Dekho</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");

        body { 
            background: #f8fafc; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 20px;
        }

        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 440px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.05); 
            border: 1px solid #e2e8f0;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .form-label { font-size: 13px; font-weight: 800; color: #64748b; margin-bottom: 8px; display: block; text-transform: uppercase; letter-spacing: 0.5px;}

        .input-block { position: relative; border: 1px solid #cbd5e1; border-radius: 12px; background: #f8fafc; padding: 14px 14px 14px 45px; transition: 0.3s; display: flex; align-items: center; margin-bottom: 15px;}
        .input-block:focus-within { border-color: #10b981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); background: white; }
        .input-block i.field-icon { position: absolute; left: 16px; font-size: 18px; color: #94a3b8; transition: 0.3s;}
        .input-block input { border: none; background: transparent; padding: 0; margin: 0; font-size: 15px; color: #1e293b; width: 100%; font-weight: 500;}
        .input-block input:focus { outline: none; }
        .input-block input::placeholder { color: #cbd5e1; font-weight: 500;}

        /* Main Login Button (Now Green) */
        .btn-login { background: #10b981; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; transition: 0.3s; font-size: 16px; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.2);}
        .btn-login:hover { background: #059669; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3); }
        .btn-login:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

        .divider { display: flex; align-items: center; text-align: center; color: #94a3b8; font-size: 12px; font-weight: 700; margin: 25px 0; text-transform: uppercase; letter-spacing: 1px;}
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #e2e8f0; }
        .divider:not(:empty)::before { margin-right: 1.5em; }
        .divider:not(:empty)::after { margin-left: 1.5em; }

        .social-btn { border-radius: 12px; padding: 12px; font-weight: 600; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; border: 1px solid #e2e8f0; text-decoration: none; color: #1e293b; margin-bottom: 12px;}
        .social-btn:hover { background: #f8fafc; border-color: #cbd5e1; color: #1e293b;}

        /* Toast Alert */
        .msg-toast { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 12px; font-weight: 700; z-index: 1050; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .msg-success { background: #ecfdf5; color: #065f46; border-left: 5px solid #10b981; }
        .msg-error { background: #fef2f2; color: #991b1b; border-left: 5px solid #ef4444; }

        .footer-link { text-align: center; margin-top: 25px; font-weight: 600; font-size: 14px; color: #64748b;}
        .footer-link a { color: #10b981; text-decoration: none; font-weight: 800; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div id="msgToast" class="msg-toast"></div>

    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-success mb-1"><i class="fas fa-leaf me-1"></i> ZAMIN DEKHO</h2>
            <p class="text-muted small fw-bold">Login to your account</p>
        </div>

        <form id="loginForm" onsubmit="event.preventDefault(); submitLogin();">

            <div class="input-block">
                <i class="fas fa-envelope field-icon"></i>
                <input type="email" id="loginEmail" placeholder="Email Address" required>
            </div>

            <div class="input-block">
                <i class="fas fa-lock field-icon"></i>
                <input type="password" id="loginPassword" placeholder="Password" required>
            </div>

            <button type="submit" class="btn-login" id="btnLogin">
                Login
            </button>

        </form>

        <div class="divider">OR CONTINUE WITH</div>

        <a href="/api/auth/google" class="social-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="18" alt="Google"> Continue with Google
        </a>
        <a href="/api/auth/twitter" class="social-btn" style="background: #0f172a; color: white; border: none;">
            <i class="fab fa-x-twitter"></i> Continue with X
        </a>

        <div class="footer-link">
            <span>Don't have an account? </span>
            <a href="register.html">Register Here</a>
        </div>
    </div>

    <script>
        const API_URL = "/api/auth";

        function showToast(msg, type) {
            const toast = document.getElementById('msgToast');
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'} me-2"></i> ${msg}`;
            toast.className = `msg-toast msg-${type}`;
            toast.style.display = 'block';
            // Toast timeout at 2 seconds
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        async function submitLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('btnLogin');

            if(!email || !password) return showToast("Enter Email and Password!", "error");

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if(data.success) {
                    // Save Token
                    localStorage.setItem('zamin_token', data.token);
                    localStorage.setItem('zamin_user', encodeURIComponent(JSON.stringify(data.user)));

                    // ⚡ STRICT 100ms DELAY FOR SMOOTH UI TRANSITION
                    setTimeout(() => {
                        if(data.user.role === 'admin' || data.user.role === 'broker') {
                            window.location.replace('dashboard.html');
                        } else {
                            window.location.replace('index.html');
                        }
                    }, 100);

                } else {
                    showToast(data.message || "Invalid Email or Password", "error");
                    btn.disabled = false;
                    btn.innerHTML = 'Login';
                }
            } catch (err) {
                showToast("Connection failed. Try again.", "error");
                btn.disabled = false;
                btn.innerHTML = 'Login';
            }
        }

        // Fast Social Login Check
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const userStr = urlParams.get('user');

            if(token && userStr) {
                localStorage.setItem('zamin_token', token);
                localStorage.setItem('zamin_user', userStr);

                // Clear URL parameters
                window.history.replaceState({}, document.title, window.location.pathname);

                const userObj = JSON.parse(decodeURIComponent(userStr));

                // ⚡ STRICT 100ms DELAY FOR SMOOTH UI TRANSITION
                setTimeout(() => {
                    if(userObj.role === 'admin' || userObj.role === 'broker') {
                        window.location.replace('dashboard.html');
                    } else {
                        window.location.replace('index.html');
                    }
                }, 100);
            }
        };
    </script>
</body>
</html>
