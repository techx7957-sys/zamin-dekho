<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | Zamin Dekho</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");

        body { 
            background: #f8fafc; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
        }

        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 420px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.05); 
            border: 1px solid #e2e8f0;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .form-control { padding: 14px; border-radius: 12px; border: 1px solid #cbd5e1; font-size: 15px; background: #f1f5f9; margin-bottom: 15px; transition: 0.3s;}
        .form-control:focus { border-color: #10b981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); background: white; }

        .btn-otp { background: #10b981; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; width: 100%; transition: 0.3s; font-size: 16px; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .btn-otp:hover { background: #059669; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); }
        .btn-otp:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

        /* 🌟 Multichannel Icons UI */
        .channel-header { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; }
        .channel-pill { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; color: #64748b; transition: 0.3s; }
        .channel-pill i { width: 45px; height: 45px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #94a3b8; transition: 0.3s; border: 1px solid #e2e8f0; }
        .channel-pill.active i { background: #10b981; color: white; border-color: #059669; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3); animation: pop 0.3s ease-out;}
        .channel-pill.active { color: #10b981; }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

        .divider { display: flex; align-items: center; text-align: center; color: #94a3b8; font-size: 12px; font-weight: 700; margin: 25px 0; text-transform: uppercase; letter-spacing: 1px;}
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #e2e8f0; }
        .divider:not(:empty)::before { margin-right: 1.5em; }
        .divider:not(:empty)::after { margin-left: 1.5em; }

        .social-btn { border-radius: 12px; padding: 12px; font-weight: 600; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; border: 1px solid #e2e8f0; text-decoration: none; color: #1e293b; margin-bottom: 12px;}
        .social-btn:hover { background: #f8fafc; border-color: #cbd5e1; color: #1e293b;}

        /* Smart OTP Input Boxes */
        .otp-group { display: flex; gap: 8px; justify-content: center; margin-bottom: 25px; }
        .otp-input { width: 48px; height: 58px; text-align: center; font-size: 24px; font-weight: 800; border-radius: 12px; border: 2px solid #e2e8f0; background: #f1f5f9; outline: none; transition: 0.2s; color: #0f172a;}
        .otp-input:focus { border-color: #10b981; background: white; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.15);}

        /* Toast Alert */
        .msg-toast { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 12px; font-weight: 700; z-index: 1050; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .msg-success { background: #ecfdf5; color: #065f46; border-left: 5px solid #10b981; }
        .msg-error { background: #fef2f2; color: #991b1b; border-left: 5px solid #ef4444; }
    </style>
</head>
<body>

    <div id="msgToast" class="msg-toast"></div>

    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-success mb-1"><i class="fas fa-leaf me-1"></i> ZAMIN DEKHO</h2>
            <p class="text-muted small fw-bold">India's Smartest Land Marketplace</p>
        </div>

        <div class="channel-header" id="channelHeader">
            <div class="channel-pill" id="pillSms"><i class="fas fa-sms"></i>SMS</div>
            <div class="channel-pill" id="pillWa"><i class="fab fa-whatsapp"></i>WhatsApp</div>
            <div class="channel-pill" id="pillMail"><i class="fas fa-envelope"></i>Email</div>
        </div>

        <div id="step1">
            <label class="small fw-bold text-muted mb-2 text-uppercase">Login or Create Account</label>
            <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email address" required>
            <input type="tel" id="loginPhone" class="form-control" placeholder="Phone Number (e.g. 9876543210)" maxlength="10" required>

            <button class="btn-otp" onclick="requestMultichannelOTP()" id="btnRequest">
                Send Secure OTP <i class="fas fa-arrow-right"></i>
            </button>

            <div class="divider">OR CONTINUE WITH</div>

            <a href="/api/auth/google" class="social-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="18" alt="Google"> Google
            </a>
            <a href="/api/auth/twitter" class="social-btn" style="background: #0f172a; color: white; border: none;">
                <i class="fab fa-x-twitter"></i> Continue with X
            </a>

            <div class="text-center mt-4 mb-2">
                <span class="text-muted fw-medium">Don't have an account? </span>
                <a href="register.html" class="text-primary fw-bold text-decoration-none" style="transition: 0.2s;">Register Here</a>
            </div>

        </div>

        <div id="step2" style="display:none;">
            <div class="text-center mb-4">
                <p class="text-success fw-bold small"><i class="fas fa-shield-check"></i> OTP sent to all 3 channels!</p>
                <h5 class="fw-bold">Enter Verification Code</h5>
            </div>

            <div class="otp-group" onpaste="handleOtpPaste(event)">
                <input type="text" maxlength="1" class="otp-input" id="otp1" onkeyup="handleOtpInput(event, 'otp1', 'otp2', '')">
                <input type="text" maxlength="1" class="otp-input" id="otp2" onkeyup="handleOtpInput(event, 'otp2', 'otp3', 'otp1')">
                <input type="text" maxlength="1" class="otp-input" id="otp3" onkeyup="handleOtpInput(event, 'otp3', 'otp4', 'otp2')">
                <input type="text" maxlength="1" class="otp-input" id="otp4" onkeyup="handleOtpInput(event, 'otp4', 'otp5', 'otp3')">
                <input type="text" maxlength="1" class="otp-input" id="otp5" onkeyup="handleOtpInput(event, 'otp5', 'otp6', 'otp4')">
                <input type="text" maxlength="1" class="otp-input" id="otp6" onkeyup="handleOtpInput(event, 'otp6', '', 'otp5')">
            </div>

            <button class="btn-otp" onclick="verifyOTPAndLogin()" id="btnVerify">
                <i class="fas fa-lock"></i> Verify & Login
            </button>

            <div class="text-center mt-4">
                <button class="btn btn-link btn-sm text-muted fw-bold text-decoration-none" onclick="location.reload()">
                    <i class="fas fa-arrow-left me-1"></i> Change Details
                </button>
            </div>
        </div>

        <p class="text-center small mt-4 mb-0 text-muted">
            By continuing, you agree to our <a href="#" class="text-success fw-bold text-decoration-none">Terms of Service</a>.
        </p>
    </div>

    <script>
        const API_URL = "/api/auth";

        function showToast(msg, type) {
            const toast = document.getElementById('msgToast');
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'} me-2"></i> ${msg}`;
            toast.className = `msg-toast msg-${type}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }

        // 🧠 Smart OTP Input Handling
        function handleOtpInput(e, currentId, nextId, prevId) {
            const current = document.getElementById(currentId);
            if (e.key === 'Backspace') {
                if (current.value === '' && prevId !== '') document.getElementById(prevId).focus();
            } else if (current.value.length === 1 && nextId !== '') {
                document.getElementById(nextId).focus();
            }
        }

        function handleOtpPaste(e) {
            e.preventDefault();
            const pasteData = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6).split('');
            if (pasteData.length === 6) {
                for (let i = 0; i < 6; i++) {
                    document.getElementById('otp' + (i + 1)).value = pasteData[i];
                }
                document.getElementById('btnVerify').focus();
            }
        }

        async function requestMultichannelOTP() {
            const email = document.getElementById('loginEmail').value;
            const phone = document.getElementById('loginPhone').value;
            const btn = document.getElementById('btnRequest');

            if(!email || !phone || phone.length < 10) return showToast("Enter valid Email & Phone Number!", "error");

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Dispatching OTP...';

            try {
                const res = await fetch(`${API_URL}/send-multichannel-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, phone })
                });
                const data = await res.json();

                if(data.success) {
                    showToast(data.message, "success");

                    // Light up the pills
                    document.getElementById('pillSms').classList.add('active');
                    setTimeout(() => document.getElementById('pillWa').classList.add('active'), 200);
                    setTimeout(() => document.getElementById('pillMail').classList.add('active'), 400);

                    setTimeout(() => {
                        document.getElementById('step1').style.display = 'none';
                        document.getElementById('step2').style.display = 'block';
                        document.getElementById('otp1').focus();
                    }, 800);
                } else {
                    showToast(data.message, "error");
                    btn.disabled = false;
                    btn.innerHTML = 'Send Secure OTP <i class="fas fa-arrow-right"></i>';
                }
            } catch (err) {
                showToast("Connection failed. Try again.", "error");
                btn.disabled = false;
                btn.innerHTML = 'Send Secure OTP <i class="fas fa-arrow-right"></i>';
            }
        }

        async function verifyOTPAndLogin() {
            const email = document.getElementById('loginEmail').value;
            const btn = document.getElementById('btnVerify');

            let otp = "";
            for(let i=1; i<=6; i++) otp += document.getElementById(`otp${i}`).value;

            if(otp.length < 6) return showToast("Enter full 6-digit OTP!", "error");

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Securing Session...';

            try {
                const res = await fetch(`${API_URL}/verify-otp-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });
                const data = await res.json();

                if(data.success) {
                    showToast("Verified! Welcome to Zamin Dekho.", "success");
                    localStorage.setItem('zamin_token', data.token);
                    localStorage.setItem('zamin_user', encodeURIComponent(JSON.stringify(data.user)));

                    setTimeout(() => {
                        // Role Based Redirection (Buyer -> Home, Broker/Admin -> Dashboard)
                        if(data.user.role === 'admin' || data.user.role === 'broker') {
                            window.location.href = 'dashboard.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    }, 1000);
                } else {
                    showToast(data.message || "Invalid OTP", "error");
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-lock"></i> Verify & Login';
                }
            } catch (err) {
                showToast("Verification failed.", "error");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-lock"></i> Verify & Login';
            }
        }

        // Catch Social Login Redirects
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const userStr = urlParams.get('user');

            if(token && userStr) {
                localStorage.setItem('zamin_token', token);
                localStorage.setItem('zamin_user', userStr);
                window.history.replaceState({}, document.title, window.location.pathname);

                const userObj = JSON.parse(decodeURIComponent(userStr));
                if(userObj.role === 'admin' || userObj.role === 'broker') {
                    window.location.href = 'dashboard.html';
                } else {
                    window.location.href = 'index.html';
                }
            }
        };
    </script>
</body>
</html>
